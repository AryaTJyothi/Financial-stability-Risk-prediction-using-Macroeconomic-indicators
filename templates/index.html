<!DOCTYPE html>
<html>

<head>

<title>Recession Prediction</title>

<style>

body{
font-family: Arial;
background:#b4dcdd;
text-align:center;
}

.container{
background:rgb(48, 122, 121);
padding:30px;
margin:auto;
width:420px;
margin-top:50px;
border-radius:10px;
box-shadow:0px 0px 10px grey;
}

input, select{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:10px 20px;
background:#052726;
color:rgb(180, 214, 214);
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#064244;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Recession Prediction System</h2>

<form method="POST">

<select name="country" required>

<option value="">Select Country</option>

{% for c in countries %}
<option value="{{c}}">{{c}}</option>
{% endfor %}

</select>

<input type="number" step="any" name="Lag_GDP" placeholder="Previous Year GDP" required>

<input type="number" step="any" name="Lag_GDP_2" placeholder="GDP 2 Years Before" required>

<input type="number" step="any" name="Lag_GDP_3" placeholder="GDP 3 Years Before" required>

<input type="number" step="any" name="Inflation" placeholder="Inflation Rate" required>

<input type="number" step="any" name="Unemployment" placeholder="Unemployment Rate" required>

<input type="number" step="any" name="Debt" placeholder="Government Debt" required>

<br>

<button type="submit">Predict</button>

</form>

{% if result %}

<div class="result">

<h3>Result: {{ result }}</h3>

<p>No Recession Probability: {{ prob_no }}%</p>

<p>Recession Probability: {{ prob_yes }}%</p>

</div>

{% endif %}

</div>

</body>

</html>
